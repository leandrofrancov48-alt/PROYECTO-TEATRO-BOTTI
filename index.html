<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tour Virtual de Reservas</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; }
        #panorama { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="panorama"></div>

    <script>
        pannellum.viewer('panorama', {
            "default": {
                "firstScene": "entrada", // Le decimos que empiece por la entrada
                "autoLoad": true,
                "sceneFadeDuration": 1000, // Hace un efecto de fundido suave al cambiar de foto
                "hotSpotDebug": true // ¡EL TRUCO SECRETO QUE TE EXPLICO ABAJO!
            },

            "scenes": {
                // --- ESCENA 1: LA ENTRADA ---
                "entrada": {
                    "title": "Galería de Entrada",
                    "type": "equirectangular",
                    "panorama": "galeria_entrada.jpg",
                    "hotSpots": [
                        {
                            "pitch": -5, // Inclinación arriba/abajo
                            "yaw": 180,  // Rotación izquierda/derecha
                            "type": "scene",
                            "text": "Entrar al Salón Principal",
                            "sceneId": "principal" // Al hacer clic, carga la escena 'principal'
                        }
                    ]
                },

                // --- ESCENA 2: EL SALÓN PRINCIPAL ---
                "principal": {
                    "title": "Salón Principal",
                    "type": "equirectangular",
                    "panorama": "salon_escenario.jpg",
                    "hotSpots": [
                        {
                            "pitch": -5,
                            "yaw": 0,
                            "type": "scene",
                            "text": "Volver a la Entrada",
                            "sceneId": "entrada" // Al hacer clic, nos devuelve a la 'entrada'
                        },
                        {
                            "pitch": -20, 
                            "yaw": -50, 
                            "type": "info",
                            "text": "Reservar esta mesa",
                            "URL": "javascript:alert('¡Acá conectaremos el formulario de reserva real!')"
                        }
                    ]
                }
            }
        });
    </script>

</body>
</html>
